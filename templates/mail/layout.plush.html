<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>TodoFlow</title>
    <style>
        /* Base Resets */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; }

        /* General Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f7fa;
            color: #333333;
            width: 100% !important;
            -webkit-font-smoothing: antialiased;
        }

        .email-wrapper {
            width: 100%;
            background-color: #f4f7fa;
            padding: 20px 0;
        }

        .email-content {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .header {
            background-color: #4f46e5; /* primary color */
            color: #ffffff;
            text-align: center;
            padding: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }

        .body-content {
            padding: 32px;
            line-height: 1.6;
            font-size: 16px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #888888;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            color: #111827;
            margin-top: 0;
            margin-bottom: 16px;
        }

        h2 { font-size: 22px; font-weight: bold; }
        h3 { font-size: 18px; font-weight: 600; }

        p {
            margin: 0 0 16px;
            color: #4b5563;
        }

        a {
            color: #4f46e5;
            text-decoration: underline;
        }

        .button {
            display: inline-block;
            background-color: #4f46e5;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            margin: 16px 0;
            text-align: center;
        }

        /* It is important to reset the a color in button */
        .button, .button:hover, .button:active, .button:visited {
            color: #ffffff !important;
        }
    </style>
</head>
<body>
    <table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center">
                <table class="email-content" width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td class="header">
                            <h1>TodoFlow</h1>
                        </td>
                    </tr>
                    <tr>
                        <td class="body-content">
                            <%= yield %>
                        </td>
                    </tr>
                </table>
                <div class="footer">
                    <p>&copy; 2026 TodoFlow. All rights reserved.</p>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
