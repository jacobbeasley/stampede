<div class="max-w-4xl mx-auto">
    <div class="mb-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <a href="<%= adminSuperOrganizationsPath() %>" class="btn btn-ghost btn-sm">← Back</a>
            <h1 class="text-3xl font-bold"><%= organization.Name %></h1>
        </div>
        <div class="flex gap-2">
            <form action="<%= authSelectOrganizationPath() %>" method="POST" class="inline-block">
                <input type="hidden" name="authenticity_token" value="<%= authenticity_token %>">
                <input type="hidden" name="organization_id" value="<%= organization.ID %>">
                <input type="hidden" name="redirect_url" value="/admin/users">
                <button type="submit" class="btn btn-primary btn-sm">Switch Organization</button>
            </form>
            <a href="<%= editAdminSuperOrganizationPath({organization_id: organization.ID}) %>" class="btn btn-outline btn-sm">Edit</a>
            <%= formFor(organization, {action: adminSuperOrganizationPath({organization_id: organization.ID}), method: "DELETE", class: "inline-block"}) { %>
                <button type="submit" class="btn btn-error btn-sm" onclick="return confirm('Are you sure you want to delete this organization? This will delete all associated data.');">Delete</button>
            <% } %>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="card bg-base-200 shadow-xl">
            <div class="card-body">
                <h2 class="card-title text-base-content/50 uppercase text-xs tracking-widest">Details</h2>
                <div class="space-y-4 mt-2">
                    <div>
                        <span class="block text-sm font-medium opacity-70">ID</span>
                        <span class="font-mono text-sm"><%= organization.ID %></span>
                    </div>
                    <div>
                        <span class="block text-sm font-medium opacity-70">Created At</span>
                        <span><%= organization.CreatedAt.Format("2006-01-02 15:04:05") %></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
