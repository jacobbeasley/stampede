<div class="flex justify-center items-center min-h-[70vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold mb-4">Forgot Password</h2>
      <p class="text-sm text-base-content/70 mb-4">Enter your email address and we will send you a link to reset your password.</p>

      <form action="/password/reset" method="POST">
        <input type="hidden" name="authenticity_token" value="<%= authenticity_token %>">
        <div class="form-control w-full">
          <label class="label" for="email">
            <span class="label-text">Email</span>
          </label>
          <input type="email" name="email" id="email" class="input input-bordered w-full" required />
        </div>

        <div class="form-control mt-6">
          <button class="btn btn-primary w-full">Send Reset Link</button>
        </div>
      </form>

      <div class="text-center mt-4 text-sm">
        Remembered your password? <a href="/login" class="link link-primary">Log in here</a>
      </div>
    </div>
  </div>
</div>
