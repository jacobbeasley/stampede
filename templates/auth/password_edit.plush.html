<div class="flex justify-center items-center min-h-[70vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold mb-4">Set New Password</h2>

      <%= formFor(user, {action: "/password/edit/" + user.ID + "?token=" + token, method: "POST"}) { %>
        <div class="form-control w-full mt-4">
          <label class="label" for="user-Password">
            <span class="label-text">New Password</span>
          </label>
          <input name="Password" class="input input-bordered w-full" type="password" id="user-Password" required />
        </div>

        <div class="form-control w-full mt-4">
          <label class="label" for="user-PasswordConfirmation">
            <span class="label-text">Confirm New Password</span>
          </label>
          <input name="PasswordConfirmation" class="input input-bordered w-full" type="password" id="user-PasswordConfirmation" required />
        </div>

        <div class="form-control mt-6">
          <button class="btn btn-primary w-full">Update Password</button>
        </div>
      <% } %>
    </div>
  </div>
</div>
