<div class="flex justify-center items-center min-h-[70vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold mb-4">Login</h2>

      <%= formFor(user, {action: "/login", method: "POST"}) { %>
        <div class="form-control w-full">
          <label class="label" for="user-Email">
            <span class="label-text">Email</span>
          </label>
          <input name="Email" value="<%= user.Email %>" class="input input-bordered w-full" type="email" id="user-Email" required />
        </div>

        <div class="form-control w-full mt-4">
          <label class="label" for="user-Password">
            <span class="label-text">Password</span>
          </label>
          <input name="Password" class="input input-bordered w-full" type="password" id="user-Password" required />
          <label class="label">
            <a href="/password/reset" class="label-text-alt link link-hover">Forgot password?</a>
          </label>
        </div>

        <div class="form-control mt-6">
          <button class="btn btn-primary w-full">Login</button>
        </div>
      <% } %>

      <div class="text-center mt-4 text-sm">
        Don't have an account? <a href="/register" class="link link-primary">Register here</a>
      </div>
    </div>
  </div>
</div>
